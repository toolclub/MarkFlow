name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20 || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: MarkFlow ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## MarkFlow ${{ github.ref_name }}

            **免费开源的 Typora 风格 Markdown 编辑器**

            ### v1.1.0 更新内容

            - **原始 HTML 块支持** — `<p align="center">` 等 HTML 标签正确渲染，切换源码模式不再丢失内容
            - **嵌套列表完整支持** — 多级列表显示正确的层级符号（●/○/▪）
            - **列表 Enter 续行** — 在列表项按 Enter 自动新建同级下一项，体验与 Typora 一致
            - **卡通风格退出提示** — 未保存退出时显示友好动画弹窗
            - **Windows .md 文件图标** — 重装后资源管理器中 .md 文件显示 MarkFlow 图标

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `MarkFlow-Setup-1.1.0.exe` | 安装器，支持自定义安装目录 |
            | macOS | `MarkFlow-1.1.0.dmg` | 拖入 Applications 即可 |
            | Linux | `MarkFlow-1.1.0.AppImage` | `chmod +x` 后直接运行 |
            | Linux | `markflow_1.1.0_amd64.deb` | `sudo dpkg -i` 安装 |

            ### 快捷键速查

            `Ctrl+N` 新建 · `Ctrl+W` 关闭 · `Ctrl+Tab` 切换标签
            `Ctrl+B` 加粗 · `Ctrl+I` 斜体 · `Ctrl+K` 链接
            `Ctrl+/` 源码模式 · `Ctrl+F` 查找 · `Ctrl+Shift+T` 主题

          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
