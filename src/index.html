<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../build/icon.png">
  <title>MarkFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dark">
  <div id="toolbar">
    <div class="tg drag"><span class="brand">MarkFlow</span></div><i class="sep"></i>
    <div class="tg">
      <button class="tb" data-c="bold" title="Ctrl+B"><b>B</b></button>
      <button class="tb" data-c="italic" title="Ctrl+I"><i>I</i></button>
      <button class="tb" data-c="strike"><s>S</s></button>
      <button class="tb" data-c="inlinecode"><span style="font-family:monospace;font-size:10px">&lt;/&gt;</span></button>
    </div><i class="sep"></i>
    <div class="tg">
      <button class="tb" data-c="h1">H1</button>
      <button class="tb" data-c="h2">H2</button>
      <button class="tb" data-c="h3">H3</button>
    </div><i class="sep"></i>
    <div class="tg">
      <button class="tb" data-c="ul">⁃</button>
      <button class="tb" data-c="ol">1.</button>
      <button class="tb" data-c="task">☑</button>
      <button class="tb" data-c="quote">❝</button>
    </div><i class="sep"></i>
    <div class="tg">
      <button class="tb" data-c="codeblock">{ }</button>
      <button class="tb" data-c="table">⊞</button>
      <button class="tb" data-c="link" title="Ctrl+K">🔗</button>
      <button class="tb" data-c="image" title="Ctrl+Shift+I">📷</button>
      <button class="tb" data-c="hr">―</button>
      <button class="tb" data-c="mathblock">∑</button>
      <button class="tb" data-c="mermaid">◇</button>
    </div>
    <div class="tg fill drag"></div>
    <div class="tg">
      <button class="tb" id="btnOL">☰</button>
      <button class="tb" id="btnSrc">源码</button>
      <button class="tb" id="btnTh">🌙</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div id="tabbar">
    <div id="tablist"></div>
    <button id="tabNew" title="新建标签 (Ctrl+N)">+</button>
  </div>

  <!-- Typora-style floating find/replace panel -->
  <div id="findbar">
    <div class="find-row">
      <div class="find-input-wrap">
        <input id="fi" placeholder="查找..." spellcheck="false">
        <span id="fc" class="find-count"></span>
      </div>
      <button class="find-btn" id="fpv" title="上一个 (Shift+Enter)">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 2L1 7h10z" fill="currentColor"/></svg>
      </button>
      <button class="find-btn" id="fnx" title="下一个 (Enter)">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 10L1 5h10z" fill="currentColor"/></svg>
      </button>
      <button class="find-btn find-toggle-replace" id="ftoggle" title="替换">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4h8M6 4l3-3M6 4l3 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </button>
      <button class="find-btn find-close" id="fclose" title="关闭 (Esc)">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="replace-row" id="replaceRow" style="display:none">
      <div class="find-input-wrap">
        <input id="ri" placeholder="替换..." spellcheck="false">
      </div>
      <button class="find-btn" id="r1" title="替换">替换</button>
      <button class="find-btn" id="rall" title="全部替换">全部</button>
    </div>
  </div>

  <div id="main">
    <aside id="sidebar">
      <div class="sb-section">
        <div class="sbh">大纲</div>
        <div id="outlineList"></div>
      </div>
      <div class="sb-section" id="recentSection">
        <div class="sbh">最近文件</div>
        <div id="recentList"></div>
      </div>
      <div class="sbf" id="wordcount">0 字</div>
    </aside>

    <div id="editorPane">
      <!-- WYSIWYG area: block-based editor (each block manages its own contenteditable) -->
      <div id="wysiwyg"></div>
    </div>

    <div id="sourcePane" style="display:none">
      <textarea id="sourceTA" spellcheck="false" placeholder="Markdown 源码..."></textarea>
    </div>
  </div>

  <!-- Language popup -->
  <div id="langPopup">
    <input id="langInput" placeholder="搜索语言...">
    <div id="langList"></div>
  </div>

  <!-- Context menu -->
  <div id="contextMenu" class="ctx-menu"></div>

  <!-- Custom save/close dialog -->
  <div id="saveDialog">
    <div class="sdbox">
      <div class="sd-icon">📝</div>
      <div class="sd-title" id="sdTitle">文件有未保存的更改</div>
      <div class="sd-msg" id="sdMsg">是否在关闭前保存更改？<br>不保存将丢失当前编辑。</div>
      <div class="sd-btns">
        <button class="sd-btn save" id="sdSave">💾 保存</button>
        <button class="sd-btn discard" id="sdDiscard">🗑 不保存</button>
        <button class="sd-btn cancel" id="sdCancel">取消</button>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span id="stFile">未命名</span>
    <span id="stCur"></span>
    <span id="stW">0 字</span>
    <span>UTF-8</span>
    <span id="stMode">编辑</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>if(typeof mermaid!=='undefined')mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose'});</script>
  <script src="renderer.js"></script>
</body>
</html>
