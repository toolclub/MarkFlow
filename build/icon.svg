<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0d0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="90" ry="90" fill="url(#bg)"/>

  <!-- Subtle grid lines for tech feel -->
  <g opacity="0.05" stroke="#818cf8" stroke-width="1">
    <line x1="128" y1="16" x2="128" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="384" y1="16" x2="384" y2="496"/>
    <line x1="16" y1="128" x2="496" y2="128"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="384" x2="496" y2="384"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="128" cy="128" r="3" fill="#6366f1" opacity="0.25"/>
  <circle cx="384" cy="128" r="3" fill="#6366f1" opacity="0.25"/>
  <circle cx="128" cy="384" r="3" fill="#6366f1" opacity="0.25"/>
  <circle cx="384" cy="384" r="3" fill="#6366f1" opacity="0.25"/>

  <!-- Clean M letterform -->
  <path d="M120,370 L120,150 C120,144 124,140 130,140 L160,140 C166,140 170,144 170,150 L170,270 L240,175 C244,170 250,168 256,168 C262,168 268,170 272,175 L342,270 L342,150 C342,144 346,140 352,140 L382,140 C388,140 392,144 392,150 L392,370 C392,376 388,380 382,380 L355,380 C349,380 344,377 340,372 L256,262 L172,372 C168,377 163,380 157,380 L130,380 C124,380 120,376 120,370 Z"
        fill="url(#accent)"/>

  <!-- Flow underline accent -->
  <rect x="120" y="400" width="272" height="5" rx="2.5" fill="url(#glow)" opacity="0.5"/>

  <!-- Code bracket accents -->
  <g fill="none" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" opacity="0.35">
    <path d="M82,210 L62,260 L82,310"/>
    <path d="M430,210 L450,260 L430,310"/>
  </g>
</svg>
